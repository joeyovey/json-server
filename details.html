<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-2xl">

        <!-- Back link -->
        <a href="/index.html" class="text-blue-600 hover:underline text-sm">

        </a>

        <!-- Post content -->
        <div class="details mt-4 space-y-4">

        </div>

        <!-- Action buttons -->

            <a href="#" id="editLink"

               Edit

            <button class="delete bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition">

            </button>

        </div>

    </div>

    <script src="js/details.js"></script>
